# HMNY testnet block explorer → local xmrblocks (default port 8082)
# Install:
#   sudo cp infra/nginx/explorer.hashmonkeys.cloud.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/explorer.hashmonkeys.cloud.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# TLS:
#   sudo certbot --nginx -d explorer.hashmonkeys.cloud

server {
    listen 80;
    server_name explorer.hashmonkeys.cloud;

    root /var/www/hmny-explorer;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location /rpc/ {
        proxy_pass http://127.0.0.1:48081/;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        client_max_body_size 1m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
