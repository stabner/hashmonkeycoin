<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>HashmonkeyCoin Testnet Explorer</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f1419; color: #e6edf3; margin: 2rem; }
    h1 { color: #5bc0eb; }
    .card { background: #1a2332; border-radius: 8px; padding: 1rem 1.25rem; margin: 1rem 0; max-width: 720px; }
    .label { color: #8b949e; font-size: 0.85rem; }
    .value { font-size: 1.25rem; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #30363d; }
    a { color: #5bc0eb; }
    .err { color: #f85149; }
  </style>
</head>
<body>
  <h1>HMNY Testnet Explorer</h1>
  <p>Seed: <code>seednode.hashmonkey.cloud:48080</code> · RPC: <code>:48081</code></p>
  <div class="card">
    <div class="label">Chain height</div>
    <div class="value" id="height">…</div>
  </div>
  <div class="card">
    <div class="label">Network</div>
    <div class="value" id="net">…</div>
  </div>
  <div class="card">
    <div class="label">Recent blocks</div>
    <table><thead><tr><th>Height</th><th>Hash</th><th>Txs</th></tr></thead><tbody id="blocks"></tbody></table>
  </div>
  <p class="label">Refreshes every 30s · <a href="https://github.com/stabner/hashmonkeycoin">source</a></p>
  <script>
    async function rpc(method, params = {}) {
      const r = await fetch('/rpc/json_rpc', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jsonrpc: '2.0', id: '0', method, params })
      });
      const j = await r.json();
      if (j.error) throw new Error(j.error.message);
      return j.result;
    }
    async function refresh() {
      try {
        const info = await rpc('get_info');
        const top = Math.max(0, (info.height || 1) - 1);
        document.getElementById('height').textContent = top + ' (' + (info.testnet ? 'testnet' : 'mainnet') + ')';
        document.getElementById('net').textContent = (info.top_block_hash || '').slice(0, 16) + '… · ' + (info.difficulty || 0) + ' diff';
        const tbody = document.getElementById('blocks');
        tbody.innerHTML = '';
        for (let i = top; i > Math.max(0, top - 11); i--) {
          try {
            const b = await rpc('get_block', { height: i });
            const tr = document.createElement('tr');
            tr.innerHTML = '<td>' + b.block_header.height + '</td><td><code>' + (b.block_header.hash || '').slice(0, 20) + '…</code></td><td>' + (b.tx_hashes ? b.tx_hashes.length : 0) + '</td>';
            tbody.appendChild(tr);
          } catch (_) { /* skip missing block */ }
        }
      } catch (e) {
        document.getElementById('height').innerHTML = '<span class="err">' + e.message + '</span>';
      }
    }
    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
